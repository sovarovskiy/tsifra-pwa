<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квалификация - Цифра</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📞 Скрипт квалификации</h1>
            <p>Помощник менеджера-квалификатора</p>
        </div>

        <!-- Экран вопросов -->
        <div id="контейнер-вопросов" class="quiz-screen">
            <!-- Прогресс -->
            <div class="progress-container">
                <div id="прогресс-бар" class="progress-bar"></div>
                <div id="прогресс-текст" class="progress-text">0%</div>
            </div>

            <!-- Карточка вопроса -->
            <div class="question-card">
                <div id="вопрос-заголовок" class="question-number"></div>
                <div id="вопрос-текст" class="question-text"></div>
                <div id="намёк" class="hint"></div>
                <div id="варианты-ответов" class="options"></div>
            </div>

            <!-- Кнопки навигации -->
            <div class="nav-buttons">
                <button id="назад" class="btn btn-secondary" onclick="предыдущийВопрос()">← Назад</button>
                <button id="далее" class="btn btn-primary" onclick="следующийВопрос()">Далее →</button>
                <button id="завершить" class="btn btn-success" onclick="завершитьКвалификацию()" style="display:none;">Завершить</button>
            </div>
        </div>

        <!-- Экран результатов -->
        <div id="контейнер-результатов" class="result-screen" style="display:none;">
            <div class="result-card">
                <h2>🎯 Квалификация завершена!</h2>
                
                <div class="result-section">
                    <h3>Результаты:</h3>
                    <p><strong>JTBD:</strong> <span id="результат-jtbd"></span></p>
                    <p><strong>Воронка:</strong> <span id="результат-воронка"></span></p>
                    <p><em id="результат-воронка-описание"></em></p>
                    <p><strong>Приоритет:</strong> <span id="результат-приоритет"></span></p>
                </div>

                <div class="result-section">
                    <h3>Детализация:</h3>
                    <p><strong>Потенциал:</strong> <span id="результат-потенциал"></span></p>
                    <p><strong>Тип клиента:</strong> <span id="результат-тип"></span></p>
                    <p><strong>Регион:</strong> <span id="результат-регион"></span></p>
                    <p><strong>Срок:</strong> <span id="результат-срок"></span></p>
                    <p><strong>ЛПР:</strong> <span id="результат-лпр"></span></p>
                </div>

                <div class="result-section">
                    <h3>📝 Шаблон завершения:</h3>
                    <div id="шаблон-завершения" class="template-box"></div>
                </div>

                <button class="btn btn-primary" onclick="начатьЗаново()">🔄 Новая квалификация</button>
                <button class="btn btn-secondary" onclick="экспортироватьВCSV()">💾 Экспорт CSV</button>
            </div>

            <!-- История -->
            <div class="history-section">
                <h3>📊 История квалификаций</h3>
                <div id="список-истории" class="history-list"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
