<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квалификация - Цифра</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #1a1d2e; color: #fff; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 16px; margin-bottom: 20px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .progress-bar { background: rgba(255,255,255,0.2); height: 8px; border-radius: 4px; overflow: hidden; margin: 20px 0; }
        .progress-fill { background: #4ade80; height: 100%; transition: width 0.3s; }
        .question-card { background: #252838; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .question-number { color: #667eea; font-size: 14px; font-weight: 600; margin-bottom: 12px; }
        .question-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .question-text { color: #9ca3af; font-size: 16px; margin-bottom: 20px; line-height: 1.5; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { background: #1f2937; border: 2px solid #374151; color: #fff; padding: 16px; border-radius: 12px; cursor: pointer; text-align: left; font-size: 16px; transition: all 0.2s; }
        .option-btn:hover { border-color: #667eea; background: #2d3748; }
        .option-btn.selected { background: #667eea; border-color: #667eea; }
        .nav-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #667eea; color: #fff; }
        .btn-primary:hover { background: #5568d3; }
        .btn-secondary { background: #374151; color: #fff; }
        .btn-secondary:hover { background: #4b5563; }
        .result-screen { text-align: center; }
        .result-title { font-size: 32px; margin: 40px 0 20px; }
        .result-message { font-size: 18px; color: #9ca3af; margin-bottom: 40px; }
        .answer-list { text-align: left; background: #252838; border-radius: 16px; padding: 24px; margin: 20px 0; }
        .answer-item { padding: 12px 0; border-bottom: 1px solid #374151; }
        .answer-item:last-child { border-bottom: none; }
        .answer-q { color: #667eea; font-weight: 600; margin-bottom: 4px; }
        .answer-a { color: #9ca3af; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📞 Скрипт квалификации</h1>
            <p>Помощник менеджера-квалификатора</p>
        </div>

        <div id="quiz-screen">
            <div class="progress-bar">
                <div class="progress-fill" id="progress" style="width: 0%"></div>
            </div>
            <div id="question-container"></div>
            <div class="nav-buttons">
                <button class="btn btn-secondary" id="prev-btn" onclick="prevQuestion()">← Назад</button>
                <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()">Далее →</button>
            </div>
        </div>

        <div id="result-screen" class="result-screen hidden">
            <div class="result-title">✅ Квалификация завершена!</div>
            <div class="result-message" id="result-message"></div>
            <div class="answer-list" id="answer-summary"></div>
            <button class="btn btn-primary" onclick="restart()">Начать заново</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
